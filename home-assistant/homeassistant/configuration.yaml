# Loads default set of integrations. Do not remove.
default_config:

# ── HTTP / Reverse Proxy ───────────────────────────────────────────
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.22.0.11 # current ha_nginx container IP on iot network
    - 172.22.0.0/16 # current iot subnet
    - 172.16.0.0/12 # covers all default Docker bridge subnets
    - 127.0.0.1
    - ::1

homeassistant:
  # Public URL — set ha_external_url in secrets.yaml (same host as DuckDNS).
  external_url: !secret ha_external_url

# MQTT broker: HA 2024+ — add via Settings → Devices & services → MQTT
# (mosquitto:1883 when HA shares the `iot` Docker network with ChirpStack).
# YAML below attaches sensors to that integration after it exists.
mqtt:
  sensor: !include mqtt_sensors.yaml

# ── Includes ──────────────────────────────────────────────────────
sensor: !include sensors.yaml
automation: !include automations.yaml
script: !include scripts.yaml
