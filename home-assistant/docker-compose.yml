version: "3"

# Home Assistant + nginx + DuckDNS + Certbot. Mosquitto runs in the merged ChirpStack
# compose on the shared `iot` network; HA reaches it at mosquitto:1883.
# See README.md for setup order.

services:

  homeassistant:
    image: homeassistant/home-assistant:2024.4.3
    container_name: homeassistant
    restart: unless-stopped
    volumes:
      - ./homeassistant:/config
    networks:
      - iot
    depends_on:
      - duckdns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: ha_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - iot
    depends_on:
      - homeassistant

  duckdns:
    image: linuxserver/duckdns
    container_name: ha_duckdns
    restart: unless-stopped
    environment:
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
      - LOG_FILE=false
    networks:
      - iot

  certbot:
    image: certbot/certbot
    container_name: ha_certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    # Checks for renewal every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - iot

networks:
  iot:
    name: iot
    driver: bridge
