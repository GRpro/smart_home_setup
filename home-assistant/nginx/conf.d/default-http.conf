# ─────────────────────────────────────────────────────────────────
#  Canonical HTTP-only config for ACME (HTTP-01).
#  setup_ssl.sh copies this to default.conf before starting nginx so
#  a broken SSL template (or unreplaced YOUR_SUBDOMAIN) cannot block
#  port 80 during certificate issuance.
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
