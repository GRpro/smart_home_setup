# ChirpStack JSON integration → topic application/+/device/+/event/up
# Tune value_template to your device codec "object" fields.

# Direct ESP8266 (JSON on single topic)
# Topic: home/sensors/aht10_esp8266/measurements
# Payload: {"t": temp °C, "h": hum %, "v": battery V, "p": ...}
- name: "AHT10 Temperature"
  unique_id: aht10_esp8266_temperature
  state_topic: "home/sensors/aht10_esp8266/measurements"
  value_template: "{{ value_json.t | default('unknown') }}"
  unit_of_measurement: "°C"
  device_class: temperature
  state_class: measurement
  icon: mdi:thermometer

- name: "AHT10 Humidity"
  unique_id: aht10_esp8266_humidity
  state_topic: "home/sensors/aht10_esp8266/measurements"
  value_template: "{{ value_json.h | default('unknown') }}"
  unit_of_measurement: "%"
  device_class: humidity
  state_class: measurement
  icon: mdi:water-percent

- name: "AHT10 Battery"
  unique_id: aht10_esp8266_battery
  state_topic: "home/sensors/aht10_esp8266/measurements"
  value_template: "{{ value_json.v | default('unknown') }}"
  unit_of_measurement: "V"
  device_class: voltage
  state_class: measurement
  icon: mdi:battery

- name: "AHT10 p"
  unique_id: aht10_esp8266_p
  state_topic: "home/sensors/aht10_esp8266/measurements"
  value_template: "{{ value_json.p | default('unknown') }}"
  state_class: measurement
  icon: mdi:counter

- name: "LoRaWAN Temperature"
  unique_id: lorawan_temperature
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.object.temperature | default('unknown') }}"
  unit_of_measurement: "°C"
  device_class: temperature
  state_class: measurement
  icon: mdi:thermometer

- name: "LoRaWAN Humidity"
  unique_id: lorawan_humidity
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.object.humidity | default('unknown') }}"
  unit_of_measurement: "%"
  device_class: humidity
  state_class: measurement
  icon: mdi:water-percent

- name: "LoRaWAN Battery"
  unique_id: lorawan_battery
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.object.battery | default('unknown') }}"
  unit_of_measurement: "V"
  device_class: voltage
  state_class: measurement
  icon: mdi:battery

- name: "LoRaWAN RSSI"
  unique_id: lorawan_rssi
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.rxInfo[0].rssi | default('unknown') }}"
  unit_of_measurement: "dBm"
  device_class: signal_strength
  state_class: measurement
  icon: mdi:signal

- name: "LoRaWAN SNR"
  unique_id: lorawan_snr
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.rxInfo[0].snr | default('unknown') }}"
  unit_of_measurement: "dB"
  state_class: measurement
  icon: mdi:sine-wave

- name: "LoRaWAN Last Seen"
  unique_id: lorawan_last_seen
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.time | default('unknown') }}"
  device_class: timestamp
  icon: mdi:clock-outline

# ChirpStack Gateway Bridge stats (minimal set)
# Topic prefix `eu868` must match gateway bridge event_topic_template.
# If you have multiple gateways, replace `+` with a fixed gateway ID.
- name: "Gateway RX packets"
  unique_id: gateway_rx_packets
  state_topic: "eu868/gateway/+/event/stats"
  value_template: "{{ value_json.rxPacketsReceived | default('unknown') }}"
  state_class: measurement
  icon: mdi:radio-tower

- name: "Gateway RX packets OK"
  unique_id: gateway_rx_packets_ok
  state_topic: "eu868/gateway/+/event/stats"
  value_template: "{{ value_json.rxPacketsReceivedOk | default('unknown') }}"
  state_class: measurement
  icon: mdi:check-network

- name: "Gateway TX packets emitted"
  unique_id: gateway_tx_packets_emitted
  state_topic: "eu868/gateway/+/event/stats"
  value_template: "{{ value_json.txPacketsEmitted | default('unknown') }}"
  state_class: measurement
  icon: mdi:upload-network

- name: "Gateway stats last seen"
  unique_id: gateway_stats_last_seen
  state_topic: "eu868/gateway/+/event/stats"
  value_template: "{{ value_json.time | default('unknown') }}"
  device_class: timestamp
  icon: mdi:clock-outline
