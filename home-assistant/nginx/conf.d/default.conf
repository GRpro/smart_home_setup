# ─────────────────────────────────────────────────────────────────
#  PRE-SSL NGINX config  (Step 1 — used to obtain Let's Encrypt cert)
#
#  After obtaining the certificate, replace this file with the
#  contents of default-ssl.conf (documented in README.md).
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;   # replaced by your DuckDNS subdomain in SSL config

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: redirect to HTTPS (works after cert obtained)
    location / {
        return 301 https://$host$request_uri;
    }
}
