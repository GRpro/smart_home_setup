# ─────────────────────────────────────────────────────────────────
#  LoRaWAN MQTT Sensors
#  Data flows: LoRaWAN Device → Gateway → ChirpStack → MQTT → HA
#
#  ChirpStack publishes uplinks on:
#    application/<application-id>/device/<devEUI>/event/up
#
#  The payload JSON structure depends on your device codec.
#  Adjust value_template field paths to match your actual codec output.
#  Example codec output:
#    { "object": { "temperature": 23.5, "humidity": 60, "battery": 3.2 } }
# ─────────────────────────────────────────────────────────────────

# ── Temperature ──────────────────────────────────────────────────
- platform: mqtt
  unique_id: lorawan_temperature
  name: "LoRaWAN Temperature"
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.object.temperature | default('unknown') }}"
  unit_of_measurement: "°C"
  device_class: temperature
  state_class: measurement
  icon: mdi:thermometer

# ── Humidity ─────────────────────────────────────────────────────
- platform: mqtt
  unique_id: lorawan_humidity
  name: "LoRaWAN Humidity"
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.object.humidity | default('unknown') }}"
  unit_of_measurement: "%"
  device_class: humidity
  state_class: measurement
  icon: mdi:water-percent

# ── Battery voltage ───────────────────────────────────────────────
- platform: mqtt
  unique_id: lorawan_battery
  name: "LoRaWAN Battery"
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.object.battery | default('unknown') }}"
  unit_of_measurement: "V"
  device_class: voltage
  state_class: measurement
  icon: mdi:battery

# ── RSSI (signal strength) ────────────────────────────────────────
- platform: mqtt
  unique_id: lorawan_rssi
  name: "LoRaWAN RSSI"
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.rxInfo[0].rssi | default('unknown') }}"
  unit_of_measurement: "dBm"
  device_class: signal_strength
  state_class: measurement
  icon: mdi:signal

# ── SNR (signal quality) ──────────────────────────────────────────
- platform: mqtt
  unique_id: lorawan_snr
  name: "LoRaWAN SNR"
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.rxInfo[0].snr | default('unknown') }}"
  unit_of_measurement: "dB"
  state_class: measurement
  icon: mdi:sine-wave

# ── Last seen (join/uplink time) ──────────────────────────────────
- platform: mqtt
  unique_id: lorawan_last_seen
  name: "LoRaWAN Last Seen"
  state_topic: "application/+/device/+/event/up"
  value_template: "{{ value_json.time | default('unknown') }}"
  device_class: timestamp
  icon: mdi:clock-outline
