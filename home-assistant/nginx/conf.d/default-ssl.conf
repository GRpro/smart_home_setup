# ─────────────────────────────────────────────────────────────────
#  POST-SSL NGINX config  (Step 2 — use after cert is obtained)
#
#  Replace default.conf with this content:
#    cp nginx/conf.d/default-ssl.conf nginx/conf.d/default.conf
#  Then restart nginx:
#    docker compose restart nginx
#
#  Substitute YOUR_SUBDOMAIN with your actual DuckDNS subdomain.
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_SUBDOMAIN.duckdns.org;

    # ACME challenge (needed for auto-renewal by certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_SUBDOMAIN.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/YOUR_SUBDOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_SUBDOMAIN.duckdns.org/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Home Assistant UI ───────────────────────────────────────
    location / {
        proxy_pass         http://homeassistant:8123;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_http_version 1.1;
    }

    # ── WebSocket (required for real-time HA Companion App sync) ─
    location /api/websocket {
        proxy_pass         http://homeassistant:8123/api/websocket;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 86400;
    }
}
